name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            rid: win-x64
            platform: x64
          - arch: arm64
            rid: win-arm64
            platform: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish
        run: |
          dotnet publish NestVault_Windows/NestVault_Windows.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:Platform=${{ matrix.platform }} `
            -p:AssemblyVersion=${{ env.VERSION }}.0 `
            -p:FileVersion=${{ env.VERSION }}.0 `
            -o publish/${{ matrix.arch }}

      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path publish/${{ matrix.arch }}/* `
            -DestinationPath NestVault_Windows-${{ env.VERSION }}-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NestVault_Windows-${{ matrix.arch }}
          path: NestVault_Windows-${{ env.VERSION }}-${{ matrix.arch }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NestVault Windows v${{ env.VERSION }}
          files: artifacts/*.zip
          generate_release_notes: true
